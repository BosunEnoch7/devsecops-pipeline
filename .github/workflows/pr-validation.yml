name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/pr-validation.yml"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/pr-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-build-and-test:
    name: Java build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: app/pom.xml

      - name: Show tool versions
        run: |
          java --version
          mvn --version

      - name: Build, test, and generate coverage
        run: mvn --batch-mode clean verify

      - name: Upload test and coverage evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-validation-evidence
          path: |
            app/target/surefire-reports/
            app/target/site/jacoco/
          if-no-files-found: warn
          retention-days: 14
